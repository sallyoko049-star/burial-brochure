<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>In Loving Memory | Mrs. Vivian Uzoamaka Inyiama | Funeral Brochure</title>
  <meta name="description" content="Complete funeral memorial brochure for Mrs. Vivian Uzoamaka Inyiama, Pioneer HOD, Department of Nursing Science, Caritas University.">
  <meta name="theme-color" content="#faf7f2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    @media (min-width: 1240px) { .container { margin-left: auto; margin-right: auto; } }
    .site-header {
      background: #ffffffec;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #e8e2d9;
    }
    .header-inner {
      display: flex;
      flex-direction: column;

    }
    .nav-links {

    }
    .nav-link {

      font-weight: 500;
      color: #4a3b2c;

    #main-content {

    .hero-mini {
      background: #f3ede7;

    .portrait-photo {
      width: 210px;
      height: 210px;
      border-radius: 50%;

      margin: 0 auto 16px;

    }
    .tribute-portrait {

    .tribute-header {

      border-top: 1px dashed #e9dfd5;

    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .reading-block {
      background: #fefaf5;
      border-left: 4px solid #c7a27b;

      margin: 16px 0;
      border-radius: 0 16px 16px 0;
    }
    .bilingual {
      background: #f5efe9;
      padding: 16px;

      border-radius: 16px;
      font-size: 0.9rem;
    }
    .igbo {
      font-style: italic;
      color: #6b4c3a;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dotted #decbb8;
    }
    footer {
      background: #e8dfd7;
      text-align: center;
      padding: 24px 20px;
      font-size: 0.8rem;
      color: #5f4c38;
      margin-top: 30px;
      position: absolute;
      bottom: 0;
      width: 100%;
    }
    .date-badge {
      font-size: 0.72rem;
      background: #f0e4da;
      display: inline-block;
      padding: 5px 14px;
      border-radius: 30px;
    }
    .quote-text { font-size: 0.98rem; font-style: italic; color: #5e3e28; }
    hr { border: none; height: 1px; background: linear-gradient(90deg, #e0d4ca, transparent); margin: 20px 0; }
    .read-more-btn {
      background: none;
      border: none;
      color: #b45f2b;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 10px 0 5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .bio-flex { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .bio-portrait { text-align: center; width: 100%; max-width: 200px; margin: 0 auto; }
    .bio-text { width: 100%; }
    .bio-text h2 { margin-top: 0; }
    .toggle-extra { display: none; }
    .toggle-extra.show-full { display: block; margin-top: 12px; }
    .expandable-section.is-clickable { cursor: pointer; }
    .expandable-section .read-more-btn { position: relative; z-index: 2; }
    .section-kicker {
      display: inline-block;

    .cover-meta {
      display: flex;

    .subtle-divider {

    @media (min-width: 640px) {
      .container { padding: 0 32px; }

<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <h1>Vivian Uzoamaka Inyiama</h1>
          <p>1968 ✦ 2026 | Pioneer HOD, Nursing Science</p>
        </div>
        <div class="nav-links" id="nav-menu">
          <button class="nav-link" data-page="home">Home</button>
          <button class="nav-link" data-page="biography">Biography</button>
          <button class="nav-link" data-page="liturgy">Funeral Mass</button>
          <button class="nav-link" data-page="tributes">Tributes</button>
          <button class="nav-link" data-page="memorial">Memorial</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div class="container"><div class="loading-spinner"><i class="fas fa-peace"></i> Loading memorial...</div></div>
  </main>

  <footer style="position: fixed; bottom: 0; width: 100%;">
    <div class="container">
      <!-- <p>Caritas University, Amorji Nike, Emene, Enugu | PMB 1264, Enugu, Nigeria</p>
      <p>Website: www.caritasuni.edu.ng | Email: info@caritasuni.edu.ng</p> -->
      <p style="margin-top: 10px; font-size: 1.2rem;">“Eternal rest grant unto her, O Lord, and let perpetual light shine upon her.”</p>
    </div>
  </footer>

  <script>
    function toggleContent(targetId) {
      const fullTextDiv = document.getElementById(targetId);
      if (!fullTextDiv) return;
      const isExpanded = fullTextDiv.classList.contains('show-full');
      fullTextDiv.classList.toggle('show-full', !isExpanded);

      document.querySelectorAll('.read-more-btn[data-target="' + targetId + '"]').forEach(btn => {
        btn.innerHTML = !isExpanded
          ? '<i class="fas fa-chevron-up"></i> Read less'
          : '<i class="fas fa-chevron-down"></i> Read more';
        btn.setAttribute('aria-expanded', String(!isExpanded));
      });
    }

    function bindReadMoreToggles() {
      const buttons = document.querySelectorAll('.read-more-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          const targetId = btn.getAttribute('data-target');
          if (targetId) toggleContent(targetId);
        });
      });

      const sections = document.querySelectorAll('.expandable-section.is-clickable');
      sections.forEach(section => {
        section.addEventListener('click', function(e) {
          if (e.target.closest('.read-more-btn')) return;
          const targetId = section.getAttribute('data-target');
          if (targetId) toggleContent(targetId);
        });
      });
    }

    // const vivianHomePhoto = "https://placehold.co/400x400/e2d4ca/a4815e?text=Vivian&font=serif";
    const vivianHomePhoto = "images/home.jpg";
    // const vivianBioPhoto = "https://placehold.co/400x400/dccfc4/9b7a5a?text=Vivian+U.+Inyiama&font=serif";
    const vivianBioPhoto = "images/bio.jpg";
    function getTributeImage(initial) { return `https://ui-avatars.com/api/?background=b77e4a&color=fff&rounded=true&size=80&fontsize=0.35&name=${encodeURIComponent(initial)}`; }

    const contentStore = {
      home: () => `
        <div class="hero-mini expandable-section is-clickable" data-target="home-cover-extra">
          <img src="${vivianHomePhoto}" alt="Mrs. Vivian Uzoamaka Inyiama" class="portrait-photo">
          <span class="section-kicker">Order of Mass & Funeral Rites</span>
          <h1 style="font-size: 1.15rem; margin-bottom: 10px;">Late Mrs.</h1>
          <h1 style="font-size: 2rem; line-height: 1.02;">VIVIAN UZOAMAKA INYIAMA</h1>
          <h2 style="border-left: none; font-size: 1.2rem; margin-top: 8px;">(Nee ONODUGO)<br>“Oji-Nwayo”</h2>
          <div class="cover-meta">
            <p><strong>58 YEARS</strong></p>
            <p>Requiem Mass at<br><strong>ST. PAUL'S CATHOLIC CHURCH, MGBAGBU-OWA</strong></p>
            <p>Funeral ceremony follows at the St. Joseph's field, Ozom.</p>
            <p><strong>16th April, 2026</strong></p>
          </div>
          
        </div>

        <div class="tribute-card expandable-section is-clickable" data-target="friend-sister-extra" style="margin-bottom: 120px;">
          <div class="tribute-header">
            <img src="${getTributeImage('EZ')}" class="tribute-portrait" alt="Tribute portrait">
            <h3>Tribute to a Friend and Sister</h3>
          </div>
          <p>A great tree has fallen just like that. Your demise was like a nightmare. Death shattered the plans you have for the students, our institution and your fellow professional colleagues.</p>
          <p>Sister Vivy, you welcomed me with an open mind when I joined you last year at Caritas University and shared your office with me. Leaving me alone in that office kept me so devastated.</p>
          <div id="friend-sister-extra" class="toggle-extra">
            <p>You always told me that “we will nurture the students together for the growth of our profession and the University”.</p>
            <p>Encouraged me to bring out the best in me to mentor our students. You always had your students at heart. As you battled with your health challenges, you often used the little strength in you to teach the students and see to their welfare.</p>
            <p>You kept assuring me that you will not succumb to death. Indeed my lovely sister, you battled with the illness. I believed that God Almighty called you to rest from the burdens of life. God knows the best. My sister you have tried, go home and rest. I consoled myself knowing that you are in a better place. Sleep well until we meet to part no more.</p>
            <p>Jee nke oma my friend.</p>
            <p>Jee nke oma my lovely sister Vivy</p>
            <p>Jee nke oma my HOD</p>
            <p>Jee nke oma a woman with the MOST GOLDEN HEART.</p>
          </div>
          <button class="read-more-btn" data-target="friend-sister-extra" aria-expanded="false"><i class="fas fa-chevron-down"></i> Read more</button>
          <div class="signature">— Ezinne Lady Onwuzu Uzoamaka.</div>
        </div>
      `,

      biography: () => `
        <div class="bio-flex" style="margin-bottom: 120px;">
          <div class="bio-portrait">
            <img src="${vivianBioPhoto}" alt="Mrs. Vivian Uzoamaka Inyiama" class="portrait-photo" style="width:160px; height:160px;">
            <p class="date-badge">4th February 1968 – 9th March 2026</p>
          </div>
          <div class="bio-text tribute-card expandable-section is-clickable" data-target="biography-extra" style="background: transparent; border: none; padding: 0; margin: 0;">
            <h2>Biography Of VIVIAN UZOAMAKA INYIAMA</h2>
            <p>Vivian Uzoamaka Inyiama was born on the 4th of February, 1968, into the loving family of late Felicia and Romanus Onodugo of Umuavulu-Abor in Ojebe Ogene, Udi Local Government Area of Enugu State. She was the third of seven children born to her parents. Born to devoted Catholic parents who raised her with good morals, discipline, and the fear of God. From childhood, Vivian manifested a high level of intellectual ability, showed signs of kindness, strength, and a deep sense of responsibility towards her family and those around her.</p>
            <p>She received her primary education at Iva-Valley Primary School in Enugu, where she obtained her First School Leaving Certificate. She later proceeded to Idaw River Girls Secondary School, Enugu, for her secondary education. Because of her passion for caring for people, at the age of 19, one year after completing her secondary school studies and achieving excellent results in her WAEC, she applied to the then Anambra State Health Management Board Programme who then employed young school leavers and sent them to schools of nursing before integrating them into the civil service.</p>
            <p>She was lucky to be successful and was sent to Bishop Shanahan School of Nursing and Midwifery, Nsukka, where she trained as a nurse and midwife. In her quest for knowledge and professional development, she furthered her studies at the University of Nigeria, Enugu Campus, and Imo State University for her postgraduate education.</p>
              <p>Vivian Uzoamaka Inyiama dedicated her working life to the service of humanity. She worked with the Enugu State Ministry of Health and served most of her career at Park Lane General Hospital, Enugu, which later became Enugu State University Teaching Hospital, Enugu. She rose to the rank of Deputy Director of Nursing Services and headed different units at Park Lane Hospital before her retirement at the age of 54. She was known as a committed, hardworking, and compassionate nurse who treated patients with care, patience, and love. Her passion for nursing made her loved by colleagues, patients, and everyone who came in contact with her.</p>
            <div id="biography-extra" class="toggle-extra">
              <p>Having retired early because her years in the School of Nursing were counted as part of her service years, she quickly sought other means of livelihood. This made her secure an appointment with Caritas University, where she was made the Head of the Nursing Department of the University — a position she held until ill health prevented her from functioning effectively again. She never believed in idleness or laziness, which made her take up other part-time jobs, such as working as the Chief Nursing Officer at the Institute of Management and Technology Clinic, participating in training personnel for the World Health Organisation across Nigeria, training Traditional Birth Attendants for the Ministry of Health, Enugu State, and lots more. She was a woman of great kindness, clarity of thought, and uncommon generosity. Vivian was always ready to support family, friends, and even strangers. She made countless sacrifices for her family, and even during her time of illness, she continued to show concern for others rather than herself. Her life was a shining example of selflessness, strength, and dedication.</p>
              <p>Vivian married her heartthrob, Mr. Cyril Chukwuemeka Inyiama, who hailed from Ozom, Mgbagbu-Owa, in the year 1997. They were blessed with three lovely boys: Ugochukwu, Ifeanyichukwu, and Chukwuemeka. She loved her family deeply and gave her all to ensure their proper upbringing, well-being, and happiness. She was also a wonderful sister, relative, and friend whose presence brought peace and comfort to many.</p>
              <p>Being born and raised by staunch Catholic parents and married into another good Catholic family, Vivian continued her Christian life with much dedication and devotion. She was a very active member of the Catholic Women Organisation, Catholic Charismatic Renewal of Nigeria and Mother of Perpetual Help Sodality, in the parishes where she lived like St. Paul, Awkunanaw and Emmanuel Parish, Emene. She was not silent either in the Church activities of her husband's home town, St. Paul Mgbagbu-Owa where she participated actively especially in teaching and giving health talks to women during the Annual August meetings. She remained the President of Catholic Nurses Guild of Enugu Diocese until her demise.</p>
              <p>After a life of service, sacrifice, and love, Vivian passed on, on the 9th of March, 2026. Her passing has left a great vacuum in the lives of her family, friends, and all who knew her. Though she is no longer with us, her good works, kindness, and memories will continue to live in our hearts forever.</p>
              <p>She will always be remembered for her love, her sacrifices, her strength, and her unwavering care for others.</p>
              <div class="signature" style="margin-bottom: 220px;">May her gentle soul rest in perfect peace.<br>Rev. Fr. Stan Uche Onodugo, brother.</div>
            </div>
            <button class="read-more-btn" data-target="biography-extra" aria-expanded="false"><i class="fas fa-chevron-down"></i> Read more</button>
          </div>
        </div>
      `,

      liturgy: () => `
        <h2>Funeral Mass & Funeral Rites</h2>

        <div class="bilingual expandable-section is-clickable" data-target="reception-extra">
          <h3>(INABATA OZU N'ULO UKA)<br>RECEPTION OF THE BODY BEFORE THE MASS</h3>
          <p><strong>Priest:</strong> Praise be to God, the Father of Our Lord Jesus Christ, the Father of mercies and the God of all consolation. He comforts us in all our afflictions and thus enables us to comfort those who are in trouble, with the same consolation we have received from him.</p>
          <p><strong>All:</strong> Blessed be to God, the Father of our Lord Jesus Christ.</p>
          <div id="reception-extra" class="toggle-extra">
            <p><em>(The priest sprinkles the body with holy water sayings)</em></p>
            <p>I bless the body of <strong>Mrs. Vivian Uzoamaka Inyiama</strong> with the holy water that recalls her baptism of which St. Paul writes: “All of us who were baptized into Christ Jesus were baptized into His death. By baptism into His death we were buried together with him, so that just as Christ was raised from the dead by the glory of the Father we too might live a new life. For if we have been united with Him by likeness to His death, so shall we be united with Him by likeness to His resurrection.”</p>
            <p><strong>LET US PRAY:</strong><br>Lord we humbly ask your mercy. Accept the soul of Your daughter Mrs. Vivian Uzoamaka Inyiama, Forgive the sins she committed through human frailty. Free her from the bonds of death and admit her into everlasting life, through Christ our Lord. Amen.</p>
            <div class="igbo">
              <strong>Ukochukwu:</strong> Ekele diri Chukwu, Nna nke Onyenweanyi Jesu Kristi, Nna nke ebere niile, na Chineke Onye nkasi obi niile. N'ihi na o bu site na nkasi obi ahu onyere anyi na nsogbu anyi niile k'anyi ji wee nwe ike site na nkasi obi ahu onyere anyi, kasie ndi ozo obi n'ime mkpagbu obula diri ha.<br><br>
              <strong>Madu Niile:</strong> Ngozi diri Chineke, Nna Onyenweanyi Jesu Kristi<br><br>
              <em>(Ukochukwu efe ozu mmiri nso kwuo si)</em><br><br>
              Ejim mmiri nso were na-agozi ahu Mrs. Vivian Uzoamaka Inyiama mmiri nso na echetara anyi maka mmirichukwu nke Paul di aso dere banyere ya si: “Anyi niile emere mmirichukwu wee baa n'ime Jesu Kristi, si na mmirichukwu wee baa n'onwu ya. Ya bu, dika Kristi jiri ike ebube nke Nna wee bilie n'onwu, otu ahukwa k'anyi ga-esi na-ebi ndu ohuru. O buru n'anyi na Kristi dikoro n'otu n'oyiyi nke onwu ya, anyi na ya ga adikwa n'otu n'oyiyi nke mbilite n'onwu Ya.”<br><br>
              <strong>KAANYI RIO ARIRIO:</strong><br>Onyenweanyi, anyi ji umeala ario ebere gi. Were obi oma nara mkpuru obi nwaodibo Gi bu Mrs. Vivian Uzoamaka Inyiama mekwaara ya ebere. O buruna o mehiere site na adighi ike nke anu ahu, biko gbaghara ya. Topu ya agbu niile nke onwu, ka o gafee na ndu ebighi ebi. Site na Kristi Dinwenu anyi. Amen.
            </div>
          </div>
          <button class="read-more-btn" data-target="reception-extra" aria-expanded="false"><i class="fas fa-chevron-down"></i> Read more</button>
        </div>

        <div class="reading-block">
          <h3>FUNERAL MASS</h3>
          <p><strong>ENTRANCE ANTIPHON:</strong><br>As Jesus died and rose again, so God will raise up with him those who have died in Christ. As we all partook in death in Adam, we shall live again in Christ.</p>
          <div class="igbo"><strong>UKWE MBATA:</strong><br>Etu Jesu siri nwuo, kulitekwa n'onwu, etu ahu ka Nna ga-esi kulite ndi niile nwuru na Kristi. Etu mmadu niile siri keta onwu n'aka Adam, etu ahu ka mmadu niile ga-esi keta ndu n'aka Kristi.</div>
          <p style="margin-top: 12px;"><strong>OPENING PRAYER:</strong><br>God, you have called your daughter Mrs. Vivian Uzoamaka Inyiama from this life. Father of mercies, fulfill her faith and her hope in You, and lead her safely home to heaven to be happy with you forever. We ask this through Christ our Lord.</p>
          <div class="igbo"><strong>EKPERE MMEGHE:</strong><br>O Chukwu I sigo na ndu nkea kporo nwaodibo Gi bu Mrs. Vivian Uzoamaka Inyiama. Nna di ebere, biko mejuputa okwukwe onwere na Gi, ma dubata ya n'ulo anyi nke di na eluigwe ka o were binyere Gi n'anuri ebebe. Anyi n'ario Gi nkea site na Kristi Dinwenu anyi.</div>
        </div>

        <div class="reading-block expandable-section is-clickable" data-target="first-reading-extra">
          <h3>FIRST READING: (REVELATION 20:11 – 21:1)</h3>
          <p><em>A Reading Form the Book of Apocalypse</em></p>
          <p><em>The dead were judged according to what they had done in their lives.</em></p>
          <div id="first-reading-extra" class="toggle-extra">
            <p>I, John, saw a great white throne and the One who was sitting on it. In his presence, earth and sky vanished, leaving no trace. I saw the dead, both great and small, standing in front of his throne, while the book of life was opened, and other books opened which were the record of what they had done in their lives, by which the dead were judged.</p>
            <p>The sea gave up all the dead who were in it, Death and Hades were emptied of the dead that were in them and everyone was judged according to the way in which he had lived. Then Death and Hades were thrown into the burning lake. This burning lake is the second death, and anybody whose name could not be found written in the book of life was thrown into the burning lake.</p>
            <p>Then I saw a new heaven and a new earth, the first heaven and the first earth had disappeared now, and there was no longer any sea.</p>
            <p><strong>The word of the Lord.</strong><br>Thanks be to God.</p>

        <div class="reading-block expandable-section is-clickable" data-target="gospel-extra">
          <h3>GOSPEL</h3>
          <p><strong>A READING FROM THE HOLY GOSPEL ACCORDING TO MATTHEW (MT. 25:31-46).</strong></p>
          <p>Jesus said to his disciples: when the son of man comes in his glory, escorted by all the angels, then he will take his seat on his throne of glory. All the nations will be assembled before him and he will separate men one from another as the shepherd separates sheep from goats.</p>
          <div id="gospel-extra" class="toggle-extra">
            <p>He will place the sheep on his right and goats on his left. Then the king will say to those on his right, “Come, you whom my father has blessed, take for your heritage the kingdom prepared for you since the foundation of the world. For I was hungry and you gave me food; I was thirsty and you gave me drink; I was a stranger and you made me welcome; naked and you clothed me, sick and you visited me, in prison and you came to see me.” Then the virtuous will say to him in reply, “Lord, when did we see you hungry and feed you; or thirsty and give you drink? When did we see you a stranger and make you welcome; naked and clothe you; sick or in prison and go to see you?” And the king will answer, “I tell you solemnly, in so far as you did this to one of the least of these brothers of mine, you did it to me.”</p>
            <p>Next he will say to those on the left, “Go away from me, with your curse upon you, to the eternal fire prepared for the devil and his angels! For I was hungry and you never gave me food; I was thirsty and you never gave me anything to drink; I was a stranger and you never made me welcome, naked and you never clothed me, sick or in prison, and you did not come to my help.” They, too will ask: “Lord, when did we see you hungry or thirsty, naked or a stranger, sick or in prison, and did not help you?” The King will answer them: “I tell you solemnly, in so far as you neglected to do this to one of the least of these, you neglected to do it to me.” And they will go away to eternal punishment, and the virtuous to eternal life.</p>
            <p><strong>THE GOSPEL OF THE LORD.</strong></p>
            <div class="igbo">
              <strong>OZIOMA:</strong><br>
              <strong>IHE OGUGU NKE A SI N'OZIOMA DI ASO NKE MATHEW DERE (MT 25:31-46).</strong><br><br>
              <em>Bianu, unu ndi di ngozi nke Nna m</em><br><br>
              Mgbe Nwa nke mmadu ga-abia n'ebube ya, ya na ndi mmuooma niile, o ga-anokwasi n'ocheeze ya di ebube. A ga-akpoputa mba niile n'ihu ya, o ga-ekewa ha icheiche dika onye ozuzu aturu si ekewaputa aturu n'etiti ewu. O ga-edobe aturu n'akanri ya, dobe ewu n'akaekpe ya. Mgbe ahu, Onyeeze ga-asi ndi no n'aka nri ya: Bianu, unu ndi di ngozi nke Nna m, bianu ka unu were alaeze nke a kwadobere unu site na mbido nke uwa; n'ihina mgbe aguu na-agu m, unu nyerem nri, mgbe akpiri na-akpo m nku, unu nyere m mmiri. Abum onye obia, unu nabatara m. Agba m oto, unu yibe m akwa, mgbe m no n'oria, unu biara leta m. Ano m n'ulo mkporo, unu biakwutere m. Mgbe ahu ndi eziomume ga-aza ya si: Onyenweanyi, olee mgbe anyi huru ka aguu na-agu gi, nye gi nri, maobu ka akpiri na-akpo gi nku, nye gi mmiri? Olekwa mgbe anyi huru ka I bu onye obia, nabata gi, maobu ka I gba oto, yibe gi akwa? Olee mgbe anyi huru na I no n'oria, maobu na mkporo, bia leta gi? Onyeeze ahu ga-azakwa ha si: N'ezie, agwa m unu; mgbe obula unu meere ya obuladi otu onye pekarichara mpe n'ime umunna m ndi a, mu onwe m, ka unu meere ya.<br><br>
              Mgbe ahu o ga-asikwa ndi no n'akaekpe: Puonu n'ihu m, unu ndi aburu onu! Gaanu n'okummuo ebeebe nke a kwadooro ekwensu na ndi mmuoozi ya! N'ihina mgbe aguu na-agu m, unu enyeghi m nri. Mgbe akpiri na-akpo m nku, unu enyeghi m mmiri. Mgbe m bu onye obia, unu anabataghi m, agba m oto, unu eyinyeghi m akwa; mgbe m no n'oria na n'ulo mkporo unu abiaghi leta m. Mgbe ahu ha ga-aza si: Onyenweanyi, olee mgbe anyi huru na aguu na-agu gi, akpiri na-akpo gi nku, mgbe I bu onye obia, ka I gba oto, norokwa n'oria maobu n'ulo mkporo were ghara inyere gi aka? Ma o ga-aza ha si: N'ezie n'ezie agwa m unu, ebe unu emereghi ya o buladi otu onye dikarichara nta n'ime ndi a, unu emeereghi m ya. Ha ga-apu wee banye n'ahuhu di ebeebe, ma ndi eziomume ga-abanye na ndu ebeebe.<br><br>
              <strong>OZIOMANKE OSEBRUWA</strong>

      tributes: () => `

        <div class="tribute-card expandable-section is-clickable" data-target="wife-extra">
          <div class="tribute-header"><img src="${getTributeImage('C')}" class="tribute-portrait" alt="Tribute portrait"><h3>A Tribute to “Baby”<br>MY DEARLY BELOVED WIFE</h3></div>
          <p>Writing this tribute is the most difficult thing I have ever had to do in my whole life. Possibly because I dreaded and strongly prayed against ever officiating or presiding over the funeral of anyone younger than me in my family. Also more so because I never expected it or saw death coming.</p>
          <div id="wife-extra" class="toggle-extra">
            <p>Talking about my beloved wife Vivian Uzoamaka Inyiama (Nee Onodugo). She was a jewel of inestimable value. When you encounter and relate with her, you will realise that she is a special breed. The saying that all women are the same is a fallacy. She built my home and was my neck and backbone all through. She was my confidant and I had my confidence in her thus creating a spiritual bond between us. “Baby” married me and my entire family. As time passed by she gently impacted positively on all members of the family. She was a mother to me and our children and jointly we brought up our children to know God, love Him and serve Him. I doubt if I could have done this so well alone. Her sterling qualities of faithfulness, honesty, fear of God, gentleness, patience, endurance, understanding, diligence, generosity, love of family, neighbour and friends, humility, dependability, home manager and many more are epitomized in her. I thank God for making our paths cross in this life and I pray for a repeat of our relationship if we come this way again.</p>
            <p>Why God decided to call her up now that she should rest from all her work and enjoy her accomplishment beats my imagination. But His thoughts are not our thoughts and His ways are not our ways. Without doubt, nothing happens if He God does not will it. Therefore, as Ojinwayo has left us I believe He God willed it and I thank, praise and glorify Him.</p>
            <p>Eternal rest grant unto Vivian Uzoamaka Inyiama (nee Onodugo) AKA Ojinwayo, Oh Lord and let perpetual light shine on her, may she rest in peace, Amen.</p>

          <button class="read-more-btn" data-target="wife-extra" aria-expanded="false"><i class="fas fa-chevron-down"></i> Read more</button>

        </div>

        <div class="tribute-card">
          <div class="tribute-header"><img src="${getTributeImage('U')}" class="tribute-portrait" alt="Tribute portrait"><h3>Tribute To Nwanyi Abor</h3></div>
          <p>Nwanyi Abor, My beloved mother, a gentle soul with a big heart. I am deeply sad and heart broken with your passing. You led a life worth emulating, always making sure to care for everyone around you even with the little you had. You have imparted greatly on me and this vacuum cannot be filled, words cannot explain how much it hurts losing you mummy.</p>
          <p>It is with a heavy and sad heart that I say farewell to you till we meet to part no more. I miss you mummy, ezigbo nne mara mma.</p>
          <p>Nwanyi Abor<br>Jee nke oma.</p>
          <div class="signature">— Inyiama Ugochukwu A. (Son)</div>
        </div>

        <div class="tribute-card expandable-section is-clickable" data-target="mother-extra">
          <div class="tribute-header"><img src="${getTributeImage('I')}" class="tribute-portrait" alt="Tribute portrait"><h3>Tribute To My Mother</h3></div>
          <p>“If you live long enough, you will lose someone you love”. Many people break down when death knocks on their door, and tears flow endlessly. And even in such moments, we are reminded to thank God for the precious time we shared with those who gave our lives meaning and filled our hearts with love.</p>
          <div id="mother-extra" class="toggle-extra">
            <p>My mother was a woman of kindness, love, and compassion. She was filled with wisdom and she brought strength and comfort to everyone around her, even until her final days when she says “I don't worry about myself rather I worry about those around me (pointing at me)”. She did not only teach me how to live, she showed me through her actions, what it truly means to be kind, to love selflessly, and to have faith in God regardless of life's challenges.</p>
            <p>Though she is no longer physically with us, her lessons and values continue to live on in each and every one of us every day. Her life lived is a pace set for us to emulate. She was never afraid, even in the face of difficulty. Her bravery reminds us that death is not something to fear, but a transition into eternal rest.</p>
            <p>So, beloved family and friends, let us not dwell only in grief now that she has gone ahead of us. Rather, let us find comfort in knowing that she is finally free from pain and suffering. That, indeed, is something worth celebrating that her journey on earth, though filled with challenges, has led her to peace.</p>

          <div class="tribute-header"><img src="${getTributeImage('FS')}" class="tribute-portrait" alt="Tribute portrait"><h3>A TRIBUTE TO MY BELOVED VIVIAN, MY BACKBONE</h3></div>
          <p>With a heavy heart and tears that words cannot hold and with great trepidation, I write this tribute to my dearly beloved elder sister, Vivian Uzoamaka Inyiama, my own sister like none other, my protector, my teacher, and my greatest supporter. Your departure from this world has left a pain so deep that it is hard to accept that you are no longer here with us.</p>

            <p>Vee... War!!! You were a formidable pillar in our family, a woman of strength, wisdom, and uncommon kindness. Right from the time our parents were sick till their early deaths and even till your last moment, you lived your life for others, always ready to help, always ready to give, even when you had little for yourself. What pains me most is that even from your sick bed, when you should have been the one receiving care, you were still making sacrifices for the family, still worrying about everyone, still giving support in every way you could. That was the kind of heart you had—a heart full of love and selflessness.</p>
            <p>You were known by all for your kindness and your clarity of thought. Your words carried wisdom, and your advice always brought peace. Back in the days at Iva-Valley, your peaceful disposition earned you the name “Nwayo bu ije” from bus drivers and conductors who plied the Iva-Pottery route. I was not surprised when I learnt that your neighbours at Sunrise Estate nicknamed you, “Oji Nwayo, mmiri doro edo” all accentuating your meekness, politeness and calmness. Many people ran to you in times of trouble, and you never turned anyone away. We, your relatives, both close and distant, friends, and even strangers, benefited from your special grace in nursing the sick, comforting the weak, and standing by those who needed someone to lean on. You carried so many people in your heart, and today, we all feel the emptiness your absence has created.</p>

        <div class="tribute-card" style="margin-bottom: 120px;">

    function loadPageAsync(pageId) {
      return new Promise((resolve) => {
        setTimeout(() => {
          const content = contentStore[pageId];
          resolve(content ? content() : '<div class="hero-mini">Content not found.</div>');
        }, 30);
      });
    }

    const mainContainer = document.getElementById("main-content");
    let currentPage = "home";

    async function renderPage(pageId) {
      if (!mainContainer) return;
      mainContainer.style.opacity = "0.5";
      try {
        const htmlContent = await loadPageAsync(pageId);
        mainContainer.innerHTML = `<div class="container">${htmlContent}</div>`;
        currentPage = pageId;
        document.querySelectorAll('.nav-link').forEach(btn => {
          if (btn.getAttribute('data-page') === pageId) btn.classList.add('active');
          else btn.classList.remove('active');
        });
        bindReadMoreToggles();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        mainContainer.innerHTML = `<div class="container"><div class="hero-mini">Error loading content.</div></div>`;
      } finally {
        mainContainer.style.opacity = "1";
      }
    }

    function initNavigation() {
      document.querySelectorAll('.nav-link').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.getAttribute('data-page');
          if (page && page !== currentPage) {
            renderPage(page);
            if (window.history && window.history.pushState) {
              const url = new URL(window.location);
              url.searchParams.set('page', page);
              window.history.pushState({ page }, '', url);
            }
          }
        });
      });
      window.addEventListener('popstate', () => {
        const params = new URLSearchParams(window.location.search);
        const pageParam = params.get('page');
        if (pageParam && contentStore[pageParam]) renderPage(pageParam);
        else renderPage('home');
      });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const startPage = urlParams.get('page') && contentStore[urlParams.get('page')] ? urlParams.get('page') : 'home';
    renderPage(startPage);
    initNavigation();
  </script>
</body>
</html>
